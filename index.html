<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محول الصور لـ PDF - ياسر الخطيب</title>
    <link rel="icon" href="https://i.postimg.cc/3xZmVcrP/YASR.jpg" type="image/jpeg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* تنسيق الخلفية بألوان هادئة ومتناسقة مع الشعار */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #d6e0f0 100%); 
            color: #333;
        }

        .container { 
            background: rgba(255, 255, 255, 1); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.08); 
            text-align: center;
            width: 480px;
            position: relative;
        }

        /* تنسيق الشعار المرفق داخل الحاوية  */
        .logo-img {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 { margin-bottom: 30px; color: #2c3e50; font-size: 1.6rem; }

        /* زر اختيار الملفات المكبر والملون */
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 30px; 
            margin-bottom: 30px;
            border: 3px dashed #FF6E00; /* لون من وحي التوقيع والشعار */
            border-radius: 20px;
            background-color: #fff9f5;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            color: #FF6E00;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover {
            background-color: #fff2e6;
            border-color: #e66300;
        }

        /* زر التحميل الأخضر الحيوي */
        .upload-btn { 
            background: linear-gradient(135deg, #00b09b, #96c93d); 
            color: white; 
            border: none; 
            padding: 20px;
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 22px; 
            font-weight: 800;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 176, 155, 0.2);
            width: 100%;
        }

        .upload-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px rgba(0, 176, 155, 0.4);
        }

        #status { margin-top: 20px; font-weight: 600; color: #27ae60; }

        /* --- توقيع المطور (ياسر الخطيب) من الملف المرفق مسبقاً --- */
        .signature-card {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #FF6E00, #2196F3);
            color: white;
            padding: 10.5px 17.5px;
            border-radius: 8.5px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 1000;
            animation: float 6s ease-in-out infinite;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            text-decoration: none;
            display: inline-block;
        }

        .signature-card:hover { transform: scale(1.05); box-shadow: 0 12px 35px rgba(0,0,0,0.4); }

        @keyframes float { 
            0% { transform: translateY(0px); } 
            50% { transform: translateY(-15px); } 
            100% { transform: translateY(0px); } 
        }

        .signature-card .name { font-size: 0.95rem; font-weight: 700; margin-bottom: 5px; }
        .signature-card .title { font-size: 0.7rem; opacity: 0.9; }

        @media (max-width: 768px) { 
            .signature-card { position: relative; bottom: auto; left: auto; margin: 20px auto; display: block; width: fit-content; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.postimg.cc/3xZmVcrP/YASR.jpg" alt="Logo" class="logo-img">
    
    <h2>محول الصور إلى PDF</h2>
    
    <input type="file" id="imageInput" accept="image/*" multiple title="اختر الصور">
    
    <button class="upload-btn" onclick="generatePDF()">إنشاء وتحميل ملف PDF</button>
    
    <p id="status"></p>
</div>

<a href="https://yasser-q8.github.io/myprofile/#" class="signature-card" target="_blank" rel="noopener noreferrer">
    <div class="name">Yasser Elkhateeb</div>
    <div class="title">مطور البرنامج 67011143</div>
</a>

<script>
    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const input = document.getElementById('imageInput');
        const status = document.getElementById('status');
        
        if (input.files.length === 0) {
            alert("يرجى اختيار الصور أولاً");
            return;
        }

        status.innerText = "جاري المعالجة والضغط...";
        const pdf = new jsPDF();

        for (let i = 0; i < input.files.length; i++) {
            const file = input.files[i];
            const imageData = await readFileAsDataURL(file);
            
            if (i > 0) pdf.addPage();

            const imgProps = pdf.getImageProperties(imageData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

            // استخدام معامل FAST للحصول على ملف صغير الحجم
            pdf.addImage(imageData, 'JPEG', 0, 0, pdfWidth, pdfHeight, undefined, 'FAST');
        }

        pdf.save("YSR_jpg2pdf.pdf");
        status.innerText = "تم التحميل بنجاح!";
    }

    function readFileAsDataURL(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
