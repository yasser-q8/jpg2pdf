<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محول ياسر الذكي - الشامل</title>
    <link rel="icon" href="https://i.postimg.cc/3xZmVcrP/YASR.jpg" type="image/jpeg">
    <!-- مكتبات المعالجة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 40px 0;
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }

        .container { 
            background: white; padding: 40px; border-radius: 25px; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.05); text-align: center;
            width: 550px; margin-bottom: 30px; border: 1px solid #eee;
        }

        /* قسم تحويل PDF إلى صور (ألوان مختلفة) */
        .reverse-container {
            border-top: 5px solid #e74c3c; /* لون أحمر لتمييز العكس */
            background: #fffafa;
        }

        .logo-img { width: 100px; border-radius: 50%; margin-bottom: 15px; }
        h2 { color: #2c3e50; margin-bottom: 25px; }

        /* تلوين زر Choose Files بالأزرق وتكبيره 50% إضافية */
        input[type="file"] {
            display: block; width: 100%;
            padding: 45px; /* تكبير الحجم بنسبة 50% عن السابق */
            margin-bottom: 25px;
            border: 3px dashed #2196F3; /* اللون الأزرق المطلوب */
            border-radius: 20px;
            background-color: #f0f7ff;
            cursor: pointer;
            font-size: 20px; font-weight: bold; color: #2196F3;
            box-sizing: border-box; transition: 0.3s;
        }
        input[type="file"]:hover { background-color: #e3f2fd; }

        /* أزرار العمليات */
        .btn { 
            width: 100%; padding: 18px; border-radius: 50px; border: none;
            font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.3s;
            color: white;
        }
        .btn-pdf { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .btn-img { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        #status, #statusReverse { margin-top: 15px; font-weight: bold; color: #555; }

        /* التوقيع الخاص بك */
        .signature-card {
            position: fixed; bottom: 20px; left: 20px;
            background: linear-gradient(135deg, #FF6E00, #2196F3);
            color: white; padding: 10.5px 17.5px; border-radius: 8.5px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); font-size: 0.8rem;
            font-weight: 600; z-index: 1000; animation: float 6s ease-in-out infinite;
            text-decoration: none; display: inline-block;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .signature-card .name { font-size: 0.95rem; font-weight: 700; }
    </style>
</head>
<body>

    <!-- القسم الأول: صور إلى PDF -->
    <div class="container">
        <img src="https://i.postimg.cc/3xZmVcrP/YASR.jpg" class="logo-img" alt="Logo">
        <h2>تحويل الصور إلى ملف PDF</h2>
        <input type="file" id="imgInput" accept="image/*" multiple>
        <button class="btn btn-pdf" onclick="convertToPDF()">إنشاء وتحميل PDF</button>
        <p id="status"></p>
    </div>

    <!-- القسم الثاني: PDF إلى صور (المربع المنفصل) -->
    <div class="container reverse-container">
        <h2 style="color: #e74c3c;">عكس العملية: PDF إلى صور</h2>
        <p style="color: #666;">اختر ملف PDF لاستخراج الصور منه</p>
        <input type="file" id="pdfInput" accept="application/pdf" style="border-color: #e74c3c; color: #e74c3c; background: #fff5f5;">
        <button class="btn btn-img" onclick="convertToImages()">استخراج الصور وتحميلها</button>
        <div id="imagePreviewContainer"></div>
        <p id="statusReverse"></p>
    </div>

    <!-- التوقيع[cite: 1, 2] -->
    <a href="https://yasser-q8.github.io/myprofile/#" class="signature-card" target="_blank">
        <div class="name">Yasser Elkhateeb</div>
        <div class="title">مطور البرنامج 67011143</div>
    </a>

<script>
    // إعداد مكتبة PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // 1. وظيفة تحويل الصور إلى PDF (المحسنة)
    async function convertToPDF() {
        const { jsPDF } = window.jspdf;
        const input = document.getElementById('imgInput');
        if (input.files.length === 0) return alert("اختر صوراً أولاً");

        document.getElementById('status').innerText = "جاري الإنشاء...";
        const pdf = new jsPDF();

        for (let i = 0; i < input.files.length; i++) {
            const imageData = await readFileAsDataURL(input.files[i]);
            if (i > 0) pdf.addPage();
            const props = pdf.getImageProperties(imageData);
            const w = pdf.internal.pageSize.getWidth();
            const h = (props.height * w) / props.width;
            pdf.addImage(imageData, 'JPEG', 0, 0, w, h, undefined, 'FAST');
        }
        pdf.save("Images_to_PDF.pdf");
        document.getElementById('status').innerText = "تم التحميل!";
    }

    // 2. وظيفة تحويل PDF إلى صور (العكسية)
    async function convertToImages() {
        const input = document.getElementById('pdfInput');
        if (input.files.length === 0) return alert("اختر ملف PDF أولاً");

        document.getElementById('statusReverse').innerText = "جاري استخراج الصور...";
        const file = input.files[0];
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2 });
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;
            
            // تحميل الصورة الناتجة
            const link = document.createElement('a');
            link.download = `Page_${i}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        document.getElementById('statusReverse').innerText = "تم استخراج جميع الصفحات!";
    }

    function readFileAsDataURL(file) {
        return new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });
    }
</script>
</body>
</html>
